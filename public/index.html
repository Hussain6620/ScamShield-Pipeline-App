<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ScamShield</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            color: #1e293b;
        }

        .header {
            background-color: #0f172a;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .container {
            max-width: 760px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            resize: vertical;
        }

        button {
            margin-top: 15px;
            padding: 12px 22px;
            background-color: #2563eb;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        .result {
            margin-top: 25px;
            padding: 18px;
            border-radius: 8px;
            display: none;
        }

        .low {
            background-color: #dcfce7;
            border: 1px solid #22c55e;
        }

        .medium {
            background-color: #fef3c7;
            border: 1px solid #f59e0b;
        }

        .high {
            background-color: #fee2e2;
            border: 1px solid #ef4444;
        }

        .small-text {
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>ScamShield</h1>
        <p>Check suspicious messages before you trust them.</p>
    </div>

    <div class="container">
        <h2>Message Checker</h2>

        <p class="small-text">
            Enter a suspicious text message, email message or link below.
        </p>

        <textarea id="message" placeholder="Example: Urgent! Click this link to verify your bank password."></textarea>

        <button onclick="checkMessage()">Check Message</button>

        <div id="result" class="result"></div>
    </div>

    <script>
        async function checkMessage() {
            const message = document.getElementById("message").value;
            const resultBox = document.getElementById("result");

            const response = await fetch("/api/check", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();

            if (!response.ok) {
                resultBox.className = "result high";
                resultBox.style.display = "block";
                resultBox.innerHTML = "<strong>Error:</strong> " + data.error;
                return;
            }

            const riskClass = data.risk.toLowerCase();

            resultBox.className = "result " + riskClass;
            resultBox.style.display = "block";

            let reasons = "No common warning words detected.";

            if (data.reasons.length > 0) {
                reasons = data.reasons.join(", ");
            }

            resultBox.innerHTML =
                "<h3>Risk Level: " + data.risk + "</h3>" +
                "<p><strong>Detected warning words:</strong> " + reasons + "</p>" +
                "<p><strong>Contains a link:</strong> " + (data.hasLink ? "Yes" : "No") + "</p>";
        }
    </script>
</body>
</html>
